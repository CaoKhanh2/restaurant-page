name: Build & Deploy (branch deploy → Hostinger)

# Push lên main → tự build Astro → đẩy dist/ vào branch `deploy`.
# Hostinger (GIT) phục vụ branch `deploy` → website cập nhật.
# KHÔNG cần merge tay main→deploy nữa.

on:
  push:
    branches: [main]
  workflow_dispatch: {}          # cho phép bấm chạy tay trong tab Actions

permissions:
  contents: write                # để GITHUB_TOKEN đẩy được lên branch deploy

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      HOOK: ${{ secrets.HOSTINGER_DEPLOY_HOOK }}   # (tuỳ chọn) webhook auto-deploy của Hostinger
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # Astro 6 yêu cầu Node >= 22.12

      # npm ci nếu có package-lock; không thì fallback npm install.
      # Runner GitHub sạch (không proxy) nên KHÔNG cần .npmrc strict-ssl=false.
      - name: Install dependencies
        run: npm ci || npm install

      - name: Build (Astro static → dist/)
        run: npm run build

      # Tạo db.php từ GitHub Secret — KHÔNG bao giờ commit file này vào git.
      - name: Generate db.php from secret
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          mkdir -p server/config
          cat > server/config/db.php << 'HEREDOC'
<?php
define('DB_HOST', 'localhost');
define('DB_NAME', 'u444601569_restaurant');
define('DB_USER', 'u444601569_dbadmin');
HEREDOC
          printf "define('DB_PASS', '%s');\n" "${DB_PASS}" >> server/config/db.php
          cat >> server/config/db.php << 'HEREDOC'
define('DB_CHARSET', 'utf8mb4');

function getDB(): PDO {
    static $pdo = null;
    if ($pdo === null) {
        $pdo = new PDO(
            sprintf('mysql:host=%s;dbname=%s;charset=%s', DB_HOST, DB_NAME, DB_CHARSET),
            DB_USER,
            DB_PASS,
            [
                PDO::ATTR_ERRMODE            => PDO::ERRMODE_EXCEPTION,
                PDO::ATTR_DEFAULT_FETCH_MODE => PDO::FETCH_ASSOC,
                PDO::ATTR_EMULATE_PREPARES   => false,
            ]
        );
    }
    return $pdo;
}
HEREDOC

      # Gộp backend PHP vào output để Hostinger có /api + /admin + /config cùng site static.
      # LOẠI TRỪ: uploads/ (ảnh runtime), seed.php & schema.sql (chạy 1 lần).
      - name: Assemble backend PHP into dist/
        run: |
          if [ -d server/api ]; then
            mkdir -p dist/api && cp -r server/api/. dist/api/
          fi
          if [ -d server/admin ]; then
            mkdir -p dist/admin && cp -r server/admin/. dist/admin/
          fi
          # config/db.php được tạo từ secret ở bước trên — copy + bảo vệ bằng .htaccess
          mkdir -p dist/config
          cp server/config/db.php dist/config/db.php
          printf 'Deny from all\n' > dist/config/.htaccess
          # uploads/ để Hostinger tự quản lý (ảnh do user upload không đưa vào git)
          mkdir -p dist/uploads/gallery dist/uploads/menu
          printf 'php_flag engine off\nOptions -Indexes\n' > dist/uploads/.htaccess
          # Dọn thứ không được phép lộ ra public
          rm -f dist/api/seed.php dist/admin/seed.php 2>/dev/null || true
          echo "Backend assembled: api/ admin/ config/ uploads/ → dist/"

      - name: Publish dist/ to `deploy` branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          commit_message: "deploy: ${{ github.sha }}"
          # Giữ history tuyến tính (không force_orphan) để Hostinger git pull fast-forward.

      # (Tuỳ chọn) báo Hostinger pull ngay — chỉ chạy nếu đã khai báo secret HOSTINGER_DEPLOY_HOOK
      - name: Trigger Hostinger auto-deploy
        if: env.HOOK != ''
        run: curl -fsSL -X POST "$HOOK" || echo "Gọi webhook thất bại — bỏ qua (Hostinger có thể tự pull theo lịch)."
