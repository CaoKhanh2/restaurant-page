name: Deploy to Hostinger
on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      # Merge dist/ + server/ into one deploy_package/
      # Astro dist/ goes first, then server/ overlays on top (admin/, api/, config/)
      # We intentionally SKIP config/db.php and schema.sql — managed manually on server
      - name: Prepare deployment package
        run: |
          mkdir -p deploy_package
          cp -a dist/. deploy_package/
          rsync -av --exclude='config/db.php' --exclude='schema.sql' server/. deploy_package/

      # lftp is more reliable than JS FTP actions against Hostinger's firewall.
      # Password is passed via env var (never exposed in logs).
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS (lftp) to Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\";
            echo '--- Remote working dir + listing (verify docroot) ---';
            pwd;
            cls -l /public_html/;
            echo '--- Start mirror ---';
            mirror --reverse --delete --verbose \
              --ignore-time \
              --exclude config/db\\.php \
              --exclude schema\\.sql \
              --exclude-glob uploads \
              ./deploy_package/ /public_html/;
            quit
          "
