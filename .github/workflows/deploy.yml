name: Deploy to Hostinger
on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      # Merge dist/ + server/ into one deploy_package/
      # Astro dist/ goes first, then server/ overlays on top (admin/, api/, config/)
      # We intentionally SKIP config/db.php and schema.sql — managed manually on server
      - name: Prepare deployment package
        run: |
          mkdir -p deploy_package
          cp -a dist/. deploy_package/
          rsync -av --exclude='config/db.php' --exclude='schema.sql' server/. deploy_package/

      # Single FTP step — no dangerous-clean-slate so server-only files
      # (uploads/, config/db.php, .user.ini, etc.) are never deleted
      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_package/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          exclude: |
            **/config/db.php
            **/uploads/**
            **/.user.ini
