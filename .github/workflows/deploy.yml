name: Deploy to Hostinger
on:
  push:
    branches: [main]

# NOTE: Hostinger's built-in Git deploy (branch `deploy`) aborts on `git pull`
# whenever untracked files exist in public_html (e.g. hashed _astro assets from a
# prior FTP run). To avoid that fight, this workflow deploys DIRECTLY via FTP with
# forced overwrite — no reliance on Hostinger pulling the deploy branch.

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Prepare deployment package
        run: |
          mkdir -p deploy_package
          cp -a dist/. deploy_package/
          rsync -av --exclude='config/db.php' --exclude='schema.sql' server/. deploy_package/

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS (force overwrite) to Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ftp:ssl-force no;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\";
            echo '--- before: docroot listing ---';
            cls -l /public_html/index.html;
            echo '--- wiping stale _astro then force-mirroring ---';
            rm -rf /public_html/_astro;
            mirror --reverse --delete --verbose --ignore-time --no-perms \
              --exclude config/db\\.php \
              --exclude schema\\.sql \
              --exclude-glob uploads \
              ./deploy_package/ /public_html/;
            echo '--- after: docroot listing ---';
            cls -l /public_html/index.html;
            quit
          "
