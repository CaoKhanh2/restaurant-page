name: Deploy to Hostinger
on:
  push:
    branches: [main]

# Flow: merge -> main triggers this workflow. It builds the Astro site (this build
# step doubles as the CI gate — a broken build fails here and nothing is published),
# then publishes the built output to the `deploy` branch. Hostinger's built-in Git
# integration (hPanel -> Advanced -> GIT, branch: deploy) pulls `deploy` into
# public_html — via its auto-deployment webhook, or a manual "Deploy" click.
#
# IMPORTANT: we commit ON TOP of the existing `deploy` history (no `git init`),
# so Hostinger's `git pull` always fast-forwards cleanly. rsync --delete removes
# stale hashed assets so no orphan _astro files remain to block future pulls.

permissions:
  contents: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site (CI gate)
        run: npm run build
        env:
          NODE_ENV: production

      # What Hostinger should serve = Astro dist/ + server overlay (admin/, api/).
      # Skip config/db.php and schema.sql; DB secrets stay manual on the server.
      - name: Assemble deploy package
        run: |
          mkdir -p deploy_package
          cp -a dist/. deploy_package/
          rsync -av --exclude='config/db.php' --exclude='schema.sql' server/. deploy_package/
          touch deploy_package/.nojekyll

      - name: Publish to deploy branch (preserve history)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --branch deploy --single-branch \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" out
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Sync new build over the working tree; --delete drops stale files (old _astro).
          rsync -av --delete --exclude='.git' ../deploy_package/ ./
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "deploy: build from ${GITHUB_SHA::7}"
            git push origin deploy
          fi
