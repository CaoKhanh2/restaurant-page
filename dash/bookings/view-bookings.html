<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Bookings - Dashboard</title>
    <link rel="stylesheet" href="../style/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo-transparent.png" alt="Logo" class="sidebar-logo">
                <h2>Dashboard</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="/dash/bookings/view-bookings.html"><i class="fas fa-calendar-check"></i> Réservations</a></li>
                    <li><a href="#"><i class="fas fa-chart-bar"></i> Statistiques</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Paramètres</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#"><i class="fas fa-sign-out-alt"></i> Déconnexion</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1>Gestion des Réservations</h1>
                <div class="filter-controls">
                    <label for="status-filter">Filtrer par statut :</label>
                    <select id="status-filter">
                        <option value="all">Toutes</option>
                        <option value="pending">En attente</option>
                        <option value="confirmed">Confirmées</option>
                        <option value="cancelled">Annulées</option>
                    </select>
                </div>
            </header>

            <div class="booking-list-container" id="booking-list">
                </div>
        </main>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="process-bookings.js"></script>
</body>
</html>
